name: ogd_env

channels:
  - conda-forge

dependencies:
  - python=3.10
  - pip

  - pip:
      # Core: OG delineation, ETE4 SmartView visualization, MinVar rooting
      - ete4==4.4.0
      - FastRoot==1.5
      # Functional annotation (optional module).
      # The eggNOG-mapper pip package bundles the diamond/hmmer binaries it needs.
      - eggnog-mapper==2.1.13